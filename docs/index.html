<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migration Progress Dashboard</title>
  <style>
    :root {
      /* Light theme (default) */
      --bg-primary: #FFFFFF;
      --bg-secondary: #F8F9FA;
      --text-primary: #131722;
      --text-secondary: #787B86;
      --border-color: #E0E3EB;
      --grid-color: #E0E3EB;

      /* Semantic colors (constant) */
      --color-positive: #089981;
      --color-negative: #F23645;
      --color-old: #9CA3AF;
      --color-new: #FF8C42;
      --color-accent: #2962FF;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #131722;
        --bg-secondary: #1E222D;
        --text-primary: #D1D4DC;
        --text-secondary: #787B86;
        --border-color: #2B2B43;
        --grid-color: #2B2B43;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    #chart-container {
      background: var(--bg-secondary);
      border-radius: 8px;
      height: 500px;
    }

    .group-controls {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .group-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      user-select: none;
    }

    .group-checkbox input {
      cursor: pointer;
    }

    .group-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      flex-wrap: wrap;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .legend-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
    }

    .legend-color.old {
      background: var(--color-old);
    }

    .legend-color.new {
      background: var(--color-new);
    }

    .legend-color.migration {
      background: linear-gradient(to right, var(--color-negative), #6B7280, var(--color-positive));
    }



    .meta {
      text-align: center;
      margin-top: 30px;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }

    .error {
      text-align: center;
      color: #e94560;
      padding: 40px;
    }

    .changes-section {
      max-width: 1100px;
      margin: 30px auto 0;
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 20px;
    }

    .changes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .changes-header h2 {
      font-size: 1rem;
      color: var(--text-primary);
      margin: 0;
    }

    .period-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-primary);
      border-radius: 4px;
      padding: 2px;
    }

    .period-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .period-btn.active {
      background: var(--color-accent);
      color: #fff;
    }

    .changes-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .changes-table th {
      padding: 8px 10px;
      text-align: right;
      font-size: 0.75rem;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
    }

    .changes-table th.date {
      text-align: left;
    }

    .changes-table td {
      padding: 6px 10px;
      text-align: right;
    }

    .changes-table td.date {
      text-align: left;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
    }


    .change-positive { color: var(--color-positive); }
    .change-negative { color: var(--color-negative); }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="dashboard-title">Migration Progress</h1>
    <p class="subtitle" id="dashboard-subtitle">Loading...</p>

    <div id="chart-container"></div>

    <div id="group-controls" class="group-controls"></div>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-color migration"></div>
        <span>Migration progress %</span>
      </div>
      <div class="legend-item">
        <div class="legend-color new"></div>
        <span id="legend-new">Loading...</span>
      </div>
    </div>

    <div class="changes-section">
      <div class="changes-header">
        <h2>Changes</h2>
        <div class="period-toggle">
          <button class="period-btn active" data-period="day">Day</button>
          <button class="period-btn" data-period="week">Week</button>
        </div>
      </div>
      <table class="changes-table" id="changes-table"></table>
    </div>

    <div class="meta" id="meta"></div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="chart.js"></script>
</body>
</html>
